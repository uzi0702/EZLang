name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish binaries
        run: |
          for rid in linux-x64 win-x64 osx-x64 osx-arm64; do
            dotnet publish src/EZlang -c Release -r "$rid" \
              --self-contained \
              -p:PublishSingleFile=true \
              -o "out/$rid"
          done

      - name: Archive binaries
        run: |
          mkdir dist
          tag="${GITHUB_REF_NAME}"
          for rid in linux-x64 osx-x64 osx-arm64; do
            tar -czf "dist/EZlang-${tag}-${rid}.tar.gz" -C "out/$rid" .
          done
          (cd out/win-x64 && zip -r "../../dist/EZlang-${tag}-win-x64.zip" .)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "EZlang ${GITHUB_REF_NAME}" \
            --generate-notes
